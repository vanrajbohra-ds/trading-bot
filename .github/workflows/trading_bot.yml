name: Trading Bot

on:
  # Triggered externally by cron-job.org every 5 minutes during market hours
  # GitHub's own scheduler is unreliable for new repos
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-bot.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-bot.txt

      - name: Run trading cycle
        run: python main.py
        env:
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:    ${{ secrets.ALPACA_BASE_URL }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY:      ${{ secrets.GOOGLE_API_KEY }}
          CEREBRAS_API_KEY:      ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit position stops if changed
        run: |
          git config user.email "trading-bot@github.com"
          git config user.name "Trading Bot"
          git add positions_stops.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: update position stops [skip ci]"
          git push || true
